version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: tatacoa-backend
    ports:
      - '4000:4000'
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: tatacoa-frontend
    ports:
      - '5173:5173'
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    restart: always